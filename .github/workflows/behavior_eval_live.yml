name: AI-OS Live Behavioral Evaluation

# Weekly drift detection (DOC-EXEC-024, Live Evaluation): records live model
# answers to all behavioral cases for every provider whose API-key secret is
# configured, scores them with the deterministic gate, and opens an Issue on
# any threshold/regression breach. Providers without a key are skipped.

on:
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  live-eval:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Record, score and gate each configured provider
        run: |
          B=Knowledge_Base/behavior_eval
          FAILED=""
          RAN=""
          for P in claude openai gemini; do
            echo "=== provider: $P"
            set +e
            python3 $B/record_live.py --provider $P --output $B/live_$P.json
            RC=$?
            set -e
            if [ "$RC" = "3" ]; then
              echo "::notice::$P: API key not configured — skipped"
              continue
            elif [ "$RC" != "0" ]; then
              FAILED="$FAILED $P(recording)"
              continue
            fi
            RAN="$RAN $P"
            python3 $B/run_behavior_eval.py --cases $B/cases.jsonl \
              --responses $B/live_$P.json --output $B/results_$P.json | tee $B/score_$P.txt
            set +e
            python3 $B/compare_eval.py --spec $B/eval_spec.json \
              --baseline $B/baseline_results.json \
              --candidate $B/results_$P.json | tee $B/gate_$P.txt
            GC=$?
            set -e
            if [ "$GC" != "0" ]; then
              FAILED="$FAILED $P"
              gh issue create \
                --title "Behavioral drift detected: $P ($(date -u +%Y-%m-%d))" \
                --body "$(printf 'Weekly live evaluation failed the behavioral gate for provider **%s**.\n\n```\n%s\n```\n\nScores:\n```\n%s\n```\n\nProcess: DOC-EXEC-024 (Live Evaluation). Investigate the failing cases, then either fix the instructions or, if the change is accepted, update golden answers and the baseline in one logged change-set.' "$P" "$(cat $B/gate_$P.txt)" "$(cat $B/score_$P.txt)")"
            fi
          done
          [ -n "$RAN" ] || echo "::warning::No provider keys configured — live evaluation did not run."
          if [ -n "$FAILED" ]; then
            echo "::error::Behavioral drift detected for:$FAILED (issues opened)"
            exit 1
          fi

      - name: Upload live results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: live-eval-results
          path: |
            Knowledge_Base/behavior_eval/live_*.json
            Knowledge_Base/behavior_eval/results_*.json
            Knowledge_Base/behavior_eval/gate_*.txt
          if-no-files-found: ignore
